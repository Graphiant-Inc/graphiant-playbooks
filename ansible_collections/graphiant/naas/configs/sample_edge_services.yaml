# Sample edge_services (Edge/Gateway CPE only)
# ===========================================
# PUT /v1/devices/{device_id}/config — edge branch
#
# edge_services: list of single-key dicts (portal device hostname → settings)
# IMPORTANT: Each list entry key must be the device's current hostname in the portal
# (used for get_device_id). Update the key if the hostname changes or lookups will fail.
# Per device (all optional; only listed keys are merged/applied):
#   localWebServerPassword: device-level LWS password (min 8 chars, upper, lower, digit)
#     Optional literal value in YAML works (dev/local only; do not commit secrets). Recommended:
#     omit here and pass vault_devices_lws_password via Ansible Vault (vault_secrets.yml.example).
#     Precedence: YAML localWebServerPassword > vault_devices_lws_password > none.
#     Without force (default): pushed only when device has no password; skipped if already configured.
#     Do not reference Ansible/playbook variables here (e.g. vault_devices_lws_password) — config
#     files are rendered with Jinja2 but no playbook context; pass vault via module parameter.
#     Self-contained Jinja (loops, set) is supported; see configs/de_workflows_configs/ examples.
#   localWebServerPasswordForce: true to replace an already-configured password.
#     REQUIRES a password from YAML, vault_devices_lws_password (matching device key), or module params.
#     Clear force after a successful set — portal stores a hash, so force stays non-idempotent.
#   dns:
#     mode: DNSModeStatic | DNSModeCloudflare | DNSModeDynamic
#     static:  # when mode is DNSModeStatic
#       primaryIpv4: "8.8.8.8"
#       primaryIpv6: "2001:4860:4860::8888"
#       secondaryIpv4: "8.8.4.4"
#       secondaryIpv6: "2001:4860:4860::8844"
#   lldp:  # LAN interface name → lldpEnabled; WAN/circuit keys fail validation
#     GigabitEthernet4/0/0: true
#     GigabitEthernet7/0/0: true
# Prerequisite: LAN segments/interfaces must exist first (e.g. interface_management.yml --tags lan).
#   dhcpSubnets:  # API key is {interface}-{ipPrefix}
#     - segment: lan-1-test   # must match GET segments[].name on the device
#       interface: GigabitEthernet7/0/0   # main or subif name from interface_management (e.g. Gig8/0/0.28)
#       ipPrefix: "10.1.11.0/24"   # must match the interface address prefix
#       state: present  # or absent to remove (subnet: null)
#       subnet:
#         name: my-dhcp-pool
#         ipGateway: "10.1.11.1"
#         ipRangesV2:
#           ipRange:
#             - start: "10.1.11.100"
#               end: "10.1.11.200"

edge_services:
  - edge-1-sdktest:
      dns:
        mode: DNSModeStatic
        static:
          primaryIpv4: "8.8.8.8"
          primaryIpv6: "2001:4860:4860::8888"
          secondaryIpv4: "8.8.4.4"
          secondaryIpv6: "2001:4860:4860::8844"
      lldp:
        GigabitEthernet4/0/0: true
        GigabitEthernet7/0/0: true
      dhcpSubnets:
        - segment: lan-1-test
          interface: GigabitEthernet7/0/0
          ipPrefix: "10.1.11.0/24"
          state: present
          subnet:
            name: Edge-1-lan-1-test-DHCP
            description: Edge-1-lan-1-test-DHCP description
            ipGateway: "10.1.11.1"
            ipRangesV2:
              ipRange:
                - start: "10.1.11.100"
                  end: "10.1.11.200"
            domainName: example.com
            domainNameServer:
              primary: "8.8.8.8"
              secondary: "8.8.4.4"
            defaultLeaseTimeSecs: 216000
            maxLeaseTimeSecs: 432000
            minLeaseTimeSecs: 1440
            staticLeases:
              "10.1.11.201":
                lease:
                  ipAddress: "10.1.11.201"
                  macAddress: "00:1A:2B:3C:4D:5E"
        - segment: lan-7-test
          interface: GigabitEthernet7/0/0.18
          ipPrefix: "10.1.17.0/24"
          state: present
          subnet:
            name: Edge-1-lan-7-test-DHCP
            description: Edge-1-lan-7-test-DHCP description
            ipGateway: "10.1.17.1"
            ipRangesV2:
              ipRange:
                - start: "10.1.17.100"
                  end: "10.1.17.200"

  - edge-2-sdktest:
      dns:
        mode: DNSModeDynamic
      lldp:
        GigabitEthernet4/0/0: true
        GigabitEthernet8/0/0: true
      dhcpSubnets:
        - segment: lan-1-test
          interface: GigabitEthernet8/0/0
          ipPrefix: "10.2.11.0/24"  
          state: present
          subnet:
            name: Edge-2-lan-1-test-DHCP
            description: Edge-2-lan-1-test-DHCP description
            ipGateway: "10.2.11.1"
            ipRangesV2:
              ipRange:
                - start: "10.2.11.100"
                  end: "10.2.11.200"
            domainName: example.com
            domainNameServer:
              primary: "8.8.8.8"
              secondary: "8.8.4.4"

  - edge-3-sdktest:
      dns:
        mode: DNSModeCloudflare
      lldp:
        GigabitEthernet4/0/0: false
        GigabitEthernet8/0/0: false
      dhcpSubnets:
        - segment: lan-7-test
          interface: GigabitEthernet8/0/0.28
          ipPrefix: "10.3.177.0/24"
          state: absent
      # localWebServerPassword: "dev-only literal; omit in production"
      localWebServerPasswordForce: true  # needs password (YAML, vault_devices_lws_password[edge-3-sdktest], or module params); set to false after apply for idempotency
