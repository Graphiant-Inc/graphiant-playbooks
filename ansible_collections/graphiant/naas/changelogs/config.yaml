---
# Configuration for antsibull-changelog
# See https://docs.ansible.com/projects/antsibull-changelog/changelog-configuration/

# Output (modern replacement for changelog_filename_template / output_formats)
output:
  - file: CHANGELOG.rst
    format: rst
    filename_version_depth: 0
    title_version_depth: 0

# Changelog file and format (standard for collections)
changes_file: changelog.yaml
changes_format: combined

# Title for the changelog (shown at top of generated changelog)
title: Graphiant NaaS

# Fragments
notes_dir: fragments
keep_fragments: false
ignore_other_fragment_extensions: true

# Prelude (release summary) section
prelude_name: release_summary
prelude_title: Release Summary

# Sections: valid keys under changes/ in changelog.yaml and their display titles
# See https://docs.ansible.com/projects/antsibull-changelog/changelog.yaml-format/
sections:
  - - major_changes
    - Major Changes
  - - minor_changes
    - Minor Changes
  - - breaking_changes
    - Breaking Changes / Porting Guide
  - - deprecated_features
    - Deprecated Features
  - - removed_features
    - Removed Features (previously deprecated)
  - - security_fixes
    - Security Fixes
  - - bugfixes
    - Bugfixes
  - - known_issues
    - Known Issues

# Trivial section (entries not shown in generated changelog)
trivial_section_name: trivial

# Fragment categories (used by lint-changelog-yaml to validate changelog.yaml section keys)
# Must include every section name that appears under releases.<version>.changes
fragment_categories:
  - major_changes
  - minor_changes
  - breaking_changes
  - deprecated_features
  - removed_features
  - security_fixes
  - bugfixes
  - known_issues
  - trivial
  - release_summary

# Optional
mention_ancestor: true
use_fqcn: true
add_plugin_period: true
changelog_nice_yaml: true
changelog_sort: version
vcs: auto
