# See collection_template CI guidance and matrix conventions:
# https://github.com/ansible-collections/collection_template/blob/main/.github/workflows/ansible-test.yml
# https://github.com/ansible-collections/news-for-maintainers
# ansible-test in Docker (sanity job): https://github.com/marketplace/actions/ansible-test
#
# `devel` may fail when upstream adds new sanity tests; `milestone` is a slower-moving branch alternative.

name: Lint Collection

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'ansible_collections/graphiant/naas/**'
      - '.github/workflows/lint.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'ansible_collections/graphiant/naas/**'
      - '.github/workflows/lint.yml'
  schedule:
    # Run weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'

jobs:
  jinjalint:
    name: Jinja2 Template Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible_collections/graphiant/naas
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ee.txt
          # Install Jinja2 template linter
          pip install djlint

      - name: Run djlint on configs
        run: djlint configs -e yaml

      - name: Run djlint on templates
        run: djlint templates -e yaml

  ansible-lint:
    name: Ansible Lint (ansible-core ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.17
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - devel
    defaults:
      run:
        working-directory: ansible_collections/graphiant/naas
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          AC="${{ matrix.ansible }}"
          if [ "$AC" = "devel" ]; then
            pip install "https://github.com/ansible/ansible/archive/devel.tar.gz"
          else
            VER="${AC#stable-}"
            pip install "ansible-core~=${VER}"
          fi

      - name: Install dependencies
        run: |
          pip install -r requirements-ee.txt
          # Install development tools needed for linting
          pip install flake8 pylint djlint ansible-lint pre-commit

      - name: Install collection
        run: |
          ansible-galaxy collection install . --force

      - name: Run ansible-lint
        run: |
          ansible-lint --config-file .ansible-lint playbooks/

  docs-lint:
    name: Documentation Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible_collections/graphiant/naas
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ee.txt
          # Install documentation and changelog tools
          pip install antsibull-docs antsibull-changelog ansible-pygments sphinx sphinx-ansible-theme

      - name: Install collection
        run: |
          ansible-galaxy collection install . --force

      - name: Run antsibull-docs lint
        run: |
          antsibull-docs lint-collection-docs --plugin-docs .

      - name: Run antsibull-changelog lint-changelog-yaml
        run: |
          antsibull-changelog lint-changelog-yaml changelogs/changelog.yaml

  ansible-test-sanity:
    name: Sanity (Ⓐ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.17
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - devel
    steps:
      # Runs ansible-test in Docker with pinned toolchains (same pattern as collection_template).
      - name: Perform sanity testing
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          ansible-core-version: ${{ matrix.ansible }}
          testing-type: sanity
          collection-root: ansible_collections/graphiant/naas
          target: --exclude templates/ --exclude configs/de_workflows_configs/

  inclusion-checklist:
    name: Ansible Inclusion Checklist Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ansible_collections/graphiant/naas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ee.txt

      - name: Check Ansible Inclusion Checklist compliance
        run: |
          python scripts/check_inclusion_checklist.py --strict
