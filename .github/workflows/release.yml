name: Release Collection

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Collection version to publish'
        required: true
        type: string

jobs:
  publish:
    name: Publish to Ansible Galaxy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible_collections/graphiant/graphiant_playbooks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create build directory
        run: |
          mkdir -p ../../build

      - name: Build collection
        run: |
          python ../../scripts/build_collection.py

      - name: Publish to Ansible Galaxy
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
        run: |
          COLLECTION_FILE=$(ls ../../build/graphiant-graphiant_playbooks-*.tar.gz | head -1)
          if [ -z "$COLLECTION_FILE" ] || [ ! -f "$COLLECTION_FILE" ]; then
            echo "Error: Collection file not found in build directory"
            exit 1
          fi
          if [ -z "$GALAXY_API_KEY" ]; then
            echo "GALAXY_API_KEY secret is not set. Skipping publish."
            exit 0
          fi
          ansible-galaxy collection publish $COLLECTION_FILE --api-key=$GALAXY_API_KEY

