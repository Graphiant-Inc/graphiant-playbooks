# Mypy for graphiant-playbooks (Ansible collection + scripts).
# Run from repo root:  PYTHONPATH=. mypy
#
# ansible-core ships without py.typed; graphiant-sdk is checked.

[mypy]
python_version = 3.12
namespace_packages = True
explicit_package_bases = True
mypy_path = .
show_error_codes = True
warn_return_any = False
check_untyped_defs = False
strict_optional = True
files = ansible_collections/graphiant/naas/plugins,scripts
exclude = (?x)(/docs/|/tests/|/test\.py$|/conf\.py$|/docsite/)

[mypy-ansible.*]
ignore_missing_imports = True
